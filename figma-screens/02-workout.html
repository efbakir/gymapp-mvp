<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=402">
<link rel="stylesheet" href="shared.css">
<title>Active Workout</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

<div class="status-bar">
  <span class="time">9:41</span>
  <span class="icons">
    <svg width="17" height="12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#000"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#000"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#000"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000"/></svg>
    <svg width="16" height="12" fill="none"><path d="M8 2.4C10.7 2.4 13 3.5 14.6 5.2L13.2 6.6C11.9 5.2 10.1 4.4 8 4.4S4.1 5.2 2.8 6.6L1.4 5.2C3 3.5 5.3 2.4 8 2.4ZM8 6.4C9.5 6.4 10.9 7 11.8 8L10.4 9.4C9.8 8.8 9 8.4 8 8.4S6.2 8.8 5.6 9.4L4.2 8C5.1 7 6.5 6.4 8 6.4ZM9.4 11.4L8 12.8L6.6 11.4C7 11 7.5 10.8 8 10.8S9 11 9.4 11.4Z" fill="#000"/></svg>
    <svg width="27" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="#000" stroke-width="1"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="#000"/><rect x="23" y="4" width="2.5" height="4" rx="1" fill="#000"/></svg>
  </span>
</div>

<div class="nav-bar-inline">
  <span class="title">Push · 1 of 4</span>
</div>

<!-- Session header strip -->
<div style="background: #fff; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;">
  <div class="flex-col gap-4">
    <span class="caption text-secondary">Push</span>
    <span class="body-text fw-600">Exercise 1 of 4</span>
  </div>
  <div style="display: flex; align-items: center; gap: 4px; padding: 6px 12px; background: var(--bg); border-radius: 100px; border: 1px solid var(--border);">
    <span style="font-size: 12px; font-weight: 600;">⏱</span>
    <span style="font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums;">1:30</span>
  </div>
</div>

<div class="content" style="padding-top: 12px;">
  <!-- Exercise Logging Card -->
  <div class="card flex-col gap-12">
    <div class="flex-row" style="justify-content: space-between;">
      <span class="hero-text">Bench Press</span>
      <span class="caption text-secondary" style="padding: 4px 8px; background: rgba(0,0,0,0.06); border-radius: 100px;">Week 3</span>
    </div>

    <span class="caption text-secondary mono">Last: 80kg × 5</span>

    <!-- Completed sets -->
    <div class="flex-col gap-8">
      <div style="display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--bg); border-radius: var(--radius-md); min-height: 44px;">
        <span class="caption text-secondary" style="width: 44px;">Set 1</span>
        <span class="body-text mono">82.5 kg</span>
        <span class="body-text mono">× 5</span>
        <span style="flex:1;"></span>
        <span style="color: var(--success); font-size: 18px;">✓</span>
      </div>
      <div style="display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--bg); border-radius: var(--radius-md); min-height: 44px;">
        <span class="caption text-secondary" style="width: 44px;">Set 2</span>
        <span class="body-text mono">82.5 kg</span>
        <span class="body-text mono">× 5</span>
        <span style="flex:1;"></span>
        <span style="color: var(--success); font-size: 18px;">✓</span>
      </div>
      <div style="display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: rgba(255,59,48,0.07); border-radius: var(--radius-md); min-height: 44px; border-left: 3px solid var(--failure);">
        <span class="caption text-secondary" style="width: 41px;">Set 3</span>
        <span class="body-text mono">82.5 kg</span>
        <span class="body-text mono">× 3</span>
        <span style="flex:1;"></span>
        <span style="color: var(--failure); font-size: 18px;">✗</span>
      </div>
    </div>

    <button class="cta">Log 82.5kg × 5</button>
    <div style="text-align: center;">
      <span class="caption text-secondary">Different weight</span>
    </div>
  </div>
</div>

<!-- Bottom bar -->
<div style="position: fixed; bottom: 0; left: 0; width: 402px; display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 34px; background: #fff; border-top: 0.5px solid var(--border);">
  <div class="flex-row gap-4 text-secondary body-text">
    <span>☰</span>
    <span>See lineup</span>
  </div>
  <span class="body-text text-secondary">Next: Overhead</span>
</div>

</body>
</html>
