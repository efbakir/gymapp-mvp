<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=402">
<link rel="stylesheet" href="shared.css">
<title>Program</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

<div class="status-bar">
  <span class="time">9:41</span>
  <span class="icons">
    <svg width="17" height="12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#000"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#000"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#000"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000"/></svg>
    <svg width="16" height="12" fill="none"><path d="M8 2.4C10.7 2.4 13 3.5 14.6 5.2L13.2 6.6C11.9 5.2 10.1 4.4 8 4.4S4.1 5.2 2.8 6.6L1.4 5.2C3 3.5 5.3 2.4 8 2.4ZM8 6.4C9.5 6.4 10.9 7 11.8 8L10.4 9.4C9.8 8.8 9 8.4 8 8.4S6.2 8.8 5.6 9.4L4.2 8C5.1 7 6.5 6.4 8 6.4ZM9.4 11.4L8 12.8L6.6 11.4C7 11 7.5 10.8 8 10.8S9 11 9.4 11.4Z" fill="#000"/></svg>
    <svg width="27" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="#000" stroke-width="1"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="#000"/><rect x="23" y="4" width="2.5" height="4" rx="1" fill="#000"/></svg>
  </span>
</div>

<div class="nav-bar" style="align-items: flex-start;">
  <div class="title">Program</div>
  <div class="nav-btn" style="margin-top: 10px;">＋</div>
</div>

<div class="content">
  <!-- Active program card -->
  <div class="card flex-col gap-8">
    <span class="overline">ACTIVE PROGRAM</span>
    <span class="hero-text">Push / Pull / Legs</span>
    <span class="caption">Week 3 of 8</span>
  </div>

  <!-- Days card -->
  <div class="card flex-col gap-12">
    <span class="section-title">Days</span>

    <div class="flex-col">
      <div class="row" style="border: none;">
        <span class="body-text">Push</span>
        <span class="chevron">›</span>
      </div>
      <div class="row">
        <span class="body-text">Pull</span>
        <span class="chevron">›</span>
      </div>
      <div class="row">
        <span class="body-text">Legs</span>
        <span class="chevron">›</span>
      </div>
    </div>
  </div>

  <!-- Actions card -->
  <div class="card flex-col gap-4">
    <div class="row" style="border: none;">
      <span class="body-text fw-600">Edit split structure</span>
    </div>
    <div class="row">
      <span class="body-text fw-600">Advanced progression settings</span>
    </div>
  </div>
</div>

<div class="tab-bar">
  <a class="tab-item">
    <span class="tab-icon">⌂</span>
    <span>Home</span>
  </a>
  <a class="tab-item active">
    <span class="tab-icon">⊞</span>
    <span>Program</span>
  </a>
  <a class="tab-item">
    <span class="tab-icon">⚙</span>
    <span>Settings</span>
  </a>
</div>

</body>
</html>
