<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=402">
<link rel="stylesheet" href="shared.css">
<title>History</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-day {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border-radius: 50%;
  position: relative;
}
.cal-day.success { background: var(--success); color: #fff; }
.cal-day.failure { background: var(--failure); color: #fff; }
.cal-day.completed { background: rgba(142,142,147,0.35); }
.cal-day.future { color: rgba(142,142,147,0.2); }
.cal-day.today { font-weight: 700; }
.cal-day.today-ring { box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.4); }
.cal-header { font-size: 11px; color: var(--text-secondary); opacity: 0.5; text-align: center; font-weight: 500; }
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">9:41</span>
  <span class="icons">
    <svg width="17" height="12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#000"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#000"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#000"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000"/></svg>
    <svg width="16" height="12" fill="none"><path d="M8 2.4C10.7 2.4 13 3.5 14.6 5.2L13.2 6.6C11.9 5.2 10.1 4.4 8 4.4S4.1 5.2 2.8 6.6L1.4 5.2C3 3.5 5.3 2.4 8 2.4ZM8 6.4C9.5 6.4 10.9 7 11.8 8L10.4 9.4C9.8 8.8 9 8.4 8 8.4S6.2 8.8 5.6 9.4L4.2 8C5.1 7 6.5 6.4 8 6.4ZM9.4 11.4L8 12.8L6.6 11.4C7 11 7.5 10.8 8 10.8S9 11 9.4 11.4Z" fill="#000"/></svg>
    <svg width="27" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="#000" stroke-width="1"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="#000"/><rect x="23" y="4" width="2.5" height="4" rx="1" fill="#000"/></svg>
  </span>
</div>

<div class="nav-bar">
  <div class="title">History</div>
</div>

<div class="content">
  <!-- Calendar card -->
  <div class="card flex-col gap-16">
    <!-- Month nav -->
    <div class="flex-row" style="justify-content: space-between;">
      <span class="text-secondary" style="font-size: 14px; font-weight: 600; width: 44px; text-align: center;">‹</span>
      <span class="section-title">March 2026</span>
      <span class="text-secondary" style="font-size: 14px; font-weight: 600; width: 44px; text-align: center; opacity: 0.3;">›</span>
    </div>

    <!-- Weekday headers -->
    <div class="cal-grid" style="gap: 4px;">
      <div class="cal-header">M</div>
      <div class="cal-header">T</div>
      <div class="cal-header">W</div>
      <div class="cal-header">T</div>
      <div class="cal-header">F</div>
      <div class="cal-header">S</div>
      <div class="cal-header">S</div>
    </div>

    <!-- Days grid - March 2026 starts on Sunday -->
    <div class="cal-grid">
      <!-- Leading empties (Sun start → 6 empties for Mon grid) -->
      <div class="cal-day"></div><div class="cal-day"></div><div class="cal-day"></div><div class="cal-day"></div><div class="cal-day"></div><div class="cal-day"></div>
      <div class="cal-day">1</div>
      <div class="cal-day">2</div>
      <div class="cal-day success">3</div>
      <div class="cal-day">4</div>
      <div class="cal-day success">5</div>
      <div class="cal-day">6</div>
      <div class="cal-day failure">7</div>
      <div class="cal-day">8</div>
      <div class="cal-day">9</div>
      <div class="cal-day success">10</div>
      <div class="cal-day">11</div>
      <div class="cal-day completed">12</div>
      <div class="cal-day">13</div>
      <div class="cal-day failure">14</div>
      <div class="cal-day">15</div>
      <div class="cal-day">16</div>
      <div class="cal-day today today-ring">17</div>
      <div class="cal-day future">18</div>
      <div class="cal-day future">19</div>
      <div class="cal-day future">20</div>
      <div class="cal-day future">21</div>
      <div class="cal-day future">22</div>
      <div class="cal-day future">23</div>
      <div class="cal-day future">24</div>
      <div class="cal-day future">25</div>
      <div class="cal-day future">26</div>
      <div class="cal-day future">27</div>
      <div class="cal-day future">28</div>
      <div class="cal-day future">29</div>
      <div class="cal-day future">30</div>
      <div class="cal-day future">31</div>
    </div>
  </div>

  <!-- Legend -->
  <div class="card flex-row gap-12" style="padding: 12px 16px;">
    <div class="flex-row gap-4">
      <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--success);"></span>
      <span class="caption text-secondary">Progressed</span>
    </div>
    <div class="flex-row gap-4">
      <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--failure);"></span>
      <span class="caption text-secondary">Failed</span>
    </div>
    <div class="flex-row gap-4">
      <span style="width: 8px; height: 8px; border-radius: 50%; background: rgba(142,142,147,0.35);"></span>
      <span class="caption text-secondary">Completed</span>
    </div>
  </div>
</div>

</body>
</html>
